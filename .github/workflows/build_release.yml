name: Build release
permissions:
  contents: write
  actions: read

on:
  workflow_dispatch:
    inputs:
      create_stable_release:
        description: "Create stable release (in addition to experimental)"
        required: false
        type: boolean
        default: false
  pull_request:
    types: [closed]
  push:
    paths:
      - "source/**"
      - "tests/**"

jobs:
  check_localization:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check localization keys
        run: python scripts/check_localization.py

  update_translation_progress:
    needs: check_localization
    if: |
      needs.check_localization.result == 'success' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main'
    uses: ./.github/workflows/update_translation_progress.yml

  build_experimental:
    needs: [check_localization, update_translation_progress]
    if: always() && (needs.check_localization.result == 'success') && (needs.update_translation_progress.result == 'success' || needs.update_translation_progress.result == 'skipped')
    uses: ./.github/workflows/build_job.yml
    with:
      release_type: experimental

  build_stable:
    needs: [check_localization, update_translation_progress]
    if: always() && github.event_name == 'workflow_dispatch' && inputs.create_stable_release && (needs.check_localization.result == 'success') && (needs.update_translation_progress.result == 'success' || needs.update_translation_progress.result == 'skipped')
    uses: ./.github/workflows/build_job.yml
    with:
      release_type: stable

  create_experimental_release:
    needs: build_experimental
    if: |
      always() &&
      github.event_name == 'workflow_dispatch' &&
      needs.build_experimental.result == 'success' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    uses: ./.github/workflows/create_release.yml
    with:
      version_tag: ${{ needs.build_experimental.outputs.version_tag }}
      commit_sha_short: ${{ needs.build_experimental.outputs.commit_sha_short }}
      release_type: experimental
    secrets: inherit

  create_stable_release:
    needs: build_stable
    if: |
      always() &&
      github.event_name == 'workflow_dispatch' &&
      inputs.create_stable_release &&
      github.ref == 'refs/heads/main' &&
      needs.build_stable.result == 'success'
    uses: ./.github/workflows/create_release.yml
    with:
      version_tag: ${{ needs.build_stable.outputs.version_tag }}
      commit_sha_short: ${{ needs.build_stable.outputs.commit_sha_short }}
      release_type: stable
    secrets: inherit
